# Local development stack for StudHub.
# Usage:
#   docker compose up -d           # boot everything
#   docker compose exec app bash   # shell into php container
#   docker compose down            # stop everything (keeps volumes)
#   docker compose down -v         # nuke volumes (full reset)
#
# Services in this stack:
#   - app      PHP-FPM 8.3 (Laravel, Composer, Pest)
#   - web      Nginx serving public/
#   - db       MySQL 8
#   - redis    Redis 7
#   - mailpit  Local mail catcher (SMTP on 1025, web UI on 8025)
#
# Reverb runs natively (not containerized) for local dev — it connects to
# the host's Redis and the app container's MySQL.

services:
  app:
    build:
      context: ./docker/php
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    image: studhub/app:dev
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      MAIL_HOST: mailpit
      MAIL_PORT: 1025

  web:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: mysql:8.4
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-studhub}"
      MYSQL_USER: "${DB_USERNAME:-studhub}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-studhub}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootpass}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    command: --default-authentication-plugin=caching_sha2_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pstudhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
  redis_data:
